<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天地の野望 - 戦国シミュレーション</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>天地の野望</h1>
            <div id="game-status" class="hidden">
                <span id="current-year">1560年 1月</span>
                <button id="btn-toggle-minimap">全体図</button>
            </div>
        </header>
        <main>
            <!-- Minimap Overlay -->
            <div id="minimap-overlay" class="hidden">
                <div class="minimap-content">
                    <h3>日本全土図</h3>
                    <div class="minimap-wrapper">
                        <canvas id="minimap-canvas" width="1000" height="500"></canvas>
                    </div>
                    <button id="btn-close-minimap">閉じる</button>
                </div>
            </div>
            <div id="title-screen">
                <div class="title-logo">天地の野望</div>
                <button id="btn-start" class="large-btn">天下統一を志す</button>
            </div>

            <div id="select-screen" class="hidden">
                <h2>武将選択</h2>
                <div id="general-list"></div>
                <div class="selection-footer">
                    <button id="btn-confirm-select" class="large-btn">この武将で開始</button>
                </div>
            </div>

            <div id="turn-overlay" class="hidden">
                <div id="turn-text">1560年 1月</div>
            </div>

            <div id="map-world-container" class="hidden">
                <div id="map-scroll-viewport">
                    <canvas id="game-canvas" width="4000" height="2000"></canvas>
                </div>
            </div>
            <div id="ui-overlay">
                <div id="info-panel" class="hidden">
                    <div id="info-panel-left" class="side-panel">
                        <div id="general-portrait-container">
                            <svg id="general-portrait" viewBox="0 0 100 100">
                                <!-- Placeholder retro silhouette -->
                                <rect width="100" height="100" fill="#222" />
                                <circle cx="50" cy="40" r="20" fill="#eed5b7" />
                                <path d="M 20 100 C 20 60, 80 60, 80 100 Z" fill="#4b0082" />
                                <!-- Simple Kabuto/Helmet shape -->
                                <path d="M 25 35 Q 50 10 75 35 Q 50 20 25 35 Z" fill="#b8860b" />
                            </svg>
                        </div>
                        <h2 id="territory-name">領地名</h2>
                        <p id="territory-owner">領主: ---</p>
                        <div id="territory-resources">兵士: 0 | 金: 0 | 米: 0</div>
                        <div id="territory-stats" class="sub-stats">
                            <span>開発: 0</span> | <span>治水: 0</span> | <span>商業: 0</span> | <span>民心: 0</span>
                        </div>
                    </div>
                    <div id="info-panel-right" class="side-panel">
                        <div class="actions">
                            <div id="action-categories" class="action-group">
                                <button id="btn-cat-domestic">内政</button>
                                <button id="btn-cat-military">軍事</button>
                                <button id="btn-cat-diplomacy">他</button>
                                <button id="btn-pass">休養</button>
                            </div>
                            
                            <div id="panel-domestic" class="action-group hidden">
                                <button id="btn-開墾">開墾</button>
                                <button id="btn-治水">治水</button>
                                <button id="btn-商売">投資</button>
                                <button id="btn-施し">施し</button>
                                <button class="btn-cancel-cat cancel-btn">戻る</button>
                            </div>
                            <div id="panel-military" class="action-group hidden">
                                <button id="btn-徴兵">徴兵</button>
                                <button id="btn-訓練">訓練</button>
                                <button id="btn-移動">移動</button>
                                <button id="btn-出陣">戦争</button>
                                <button class="btn-cancel-cat cancel-btn">戻る</button>
                            </div>
                            <div id="panel-diplomacy" class="action-group hidden">
                                <button id="btn-商人">売買</button>
                                <button id="btn-密偵">密偵</button>
                                <button id="btn-贈物">贈物</button>
                                <button class="btn-cancel-cat cancel-btn">戻る</button>
                            </div>
                            <div id="merchant-menu" class="action-group hidden">
                                <button id="btn-buy-rice">米買</button>
                                <button id="btn-sell-rice">米売</button>
                                <button id="btn-buy-arms">武器購入</button>
                                <button id="btn-cancel-merchant" class="cancel-btn">戻る</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Number Input Modal -->
            <div id="num-input-overlay" class="hidden">
                <div class="num-input-modal">
                    <h3 id="num-input-title">金銭を入力してください</h3>
                    <p id="num-input-desc">所持金: 0</p>
                    <input type="number" id="num-input-field" min="0" value="0">
                    <div class="num-input-buttons">
                        <button id="btn-num-ok" class="large-btn ok-btn">決定</button>
                        <button id="btn-num-cancel" class="large-btn cancel-btn">取消</button>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <div id="message-log">「天地の野望」へようこそ。天下を統一せよ。</div>
        </footer>
        <canvas id="battle-canvas" width="1280" height="720" class="hidden"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
