<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天地の野望 - 戦国シミュレーション</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>天地の野望</h1>
            <div id="game-status" class="hidden">
                <span id="current-year">1560年 1月</span>
                <span id="player-resources">金: 1000 | 米: 1000</span>
                <button id="btn-toggle-minimap">全体図</button>
            </div>
        </header>
        <main>
            <!-- Minimap Overlay -->
            <div id="minimap-overlay" class="hidden">
                <div class="minimap-content">
                    <h3>日本全土図</h3>
                    <div class="minimap-wrapper">
                        <canvas id="minimap-canvas" width="1000" height="500"></canvas>
                    </div>
                    <button id="btn-close-minimap">閉じる</button>
                </div>
            </div>
            <div id="title-screen">
                <div class="title-logo">天地の野望</div>
                <button id="btn-start" class="large-btn">天下統一を志す</button>
            </div>

            <div id="select-screen" class="hidden">
                <h2>武将選択</h2>
                <div id="general-list"></div>
                <div class="selection-footer">
                    <button id="btn-confirm-select" class="large-btn">この武将で開始</button>
                </div>
            </div>

            <div id="turn-overlay" class="hidden">
                <div id="turn-text">1560年 1月</div>
            </div>

            <canvas id="battle-canvas" width="1024" height="768" class="hidden"></canvas>

            <div id="map-world-container" class="hidden">
                <div id="map-scroll-viewport">
                    <canvas id="game-canvas" width="4000" height="2000"></canvas>
                </div>
            </div>
            <div id="ui-overlay">
                <div id="info-panel" class="hidden">
                    <h2 id="territory-name">領地名</h2>
                    <p id="territory-owner">領主: ---</p>
                    <div id="territory-resources">兵士: 0 | 金: 0 | 米: 0</div>
                    <div id="territory-stats" class="sub-stats">
                        <span>開発: 0</span> | <span>治水: 0</span> | <span>商業: 0</span> | <span>民心: 0</span>
                    </div>
                    <div class="actions">
                        <div class="action-group">
                            <button id="btn-開墾">開墾</button>
                            <button id="btn-治水">治水</button>
                            <button id="btn-商売">商業</button>
                            <button id="btn-施し">施し</button>
                        </div>
                        <div class="action-group">
                            <button id="btn-徴兵">徴兵</button>
                            <button id="btn-訓練">訓練</button>
                            <button id="btn-武装">武装</button>
                            <button id="btn-出陣">出陣</button>
                        </div>
                        <div id="merchant-actions" class="action-group hidden">
                            <button id="btn-商人">商人</button>
                        </div>
                        <div id="merchant-menu" class="action-group hidden">
                            <button id="btn-buy-rice">米買</button>
                            <button id="btn-sell-rice">米売</button>
                            <button id="btn-buy-arms">武器</button>
                            <button id="btn-cancel-merchant">戻る</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <div id="message-log">「天地の野望」へようこそ。天下を統一せよ。</div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
